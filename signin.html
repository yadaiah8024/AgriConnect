<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1e3c72;
        }
    </style>
  
<script>
function goToDashboard(){
window.location.href="dashboard.html";
}
</script>
</head>

<body>

    <div class="login-box">
        <h2>Sign In</h2>
        <input type="text" placeholder="Username" id="username">
    <input type="password" placeholder="Password" id="password">
<button class="login-btn" onclick="goToDashboard()">login</button>
       
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            // Simple login check
            if(user === "admin" && pass === "1234") {
                alert("Login Successful 🎉");

                // Redirect to Dashboard
                window.location.href = "dashboard.html";
            }
        }
    </script>

</body>
</html>
