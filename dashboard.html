<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgriConnect Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}
body{
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 40px;
    text-align:right;
    z-index:10;
    background:rgba(0,0,0,0.3);
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

/* HERO SECTION */
.hero{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef")
    no-repeat center center/cover;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,70,30,0.6);
    top:0;
    left:0;
}

.hero-content{
    position:relative;
    max-width:850px;
    padding:20px;
    z-index:2;
}

.season-badge{
    display:inline-block;
    background:rgba(255,255,255,0.2);
    padding:8px 18px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:20px;
}

h1{
    font-size:48px;
    font-weight:bold;
}

h1 span{
    color:#a3e635;
}

p{
    margin-top:15px;
    font-size:18px;
    line-height:1.6;
    opacity:0.95;
}

.hero-buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.shop-btn{
    background-color:#a3e635;
    color:black;
    padding:14px 32px;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.shop-btn:hover{
    background-color:#84cc16;
    transform:translateY(-3px);
}

.market-btn{
    background-color:rgba(255,255,255,0.2);
    color:white;
    padding:14px 32px;
    border:1px solid white;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.market-btn:hover{
    background:white;
    color:black;
}

@media(max-width:768px){
    h1{
        font-size:32px;
    }
    p{
        font-size:16px;
    }
}
</style>
</head>
<body>

<nav>
<a href="dashboard.html">Index</a>
<a href="Seeds.html">Seeds</a>
<a href="Fertilizer.html">Fertilizer</a>
<a href="Weather.html">Weather</a>
<a href="Market.html">Market</a>
<a href="Community.html">Community</a>
<a href="ratings.html">Ratings</a>
</nav>

<section class="hero">
<div class="hero-content">
<div class="season-badge">
🌞 Kharif Season 2026 — Now Open
</div>

<h1>
Empowering India's <br>
<span>Farmers</span>
</h1>

<p>
Buy seeds, fertilizers, equipment & more — at the best prices with expert guidance.
</p>

<div class="hero-buttons">
<button class="shop-btn" onclick="goToShop()">Shop Now →</button>
<button class="market-btn" onclick="viewMarket()">📈 Market Prices</button>
</div>
</div>
</section>

<script>
function goToShop(){
    window.location.href="Seeds.html"; 
}
function viewMarket(){
    window.location.href="Market.html"; 
}
</script>

</body>
</html>
